spring.application.name=DataFlowX
spring.kafka.bootstrap-servers=localhost:9092


# Producer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer


# Consumer
spring.kafka.consumer.group-id=bulk-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer


# Listener
spring.kafka.listener.concurrency=3

#db

spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
#here studentsDB is our DB name
spring.datasource.username=b0317110
#username that you have given while installing postgres
spring.datasource.password=
#password that you have specified while installing postgres
spring.jpa.hibernate.ddl-auto=update
#This will create schema on running your application and will also drop all schemas once you stop your application
spring.jpa.show-sql=true
#TO see all the SQL statements run by hibernate
spring.jpa.properties.hibernate.format_sql=true
#Format the hibernate queries, statements

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB